name = "bar-salotto"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Gmail OAuth credentials + thread ID cache
# Setup:
#   1. wrangler kv namespace create BS_KV
#   2. Replace id below with the printed namespace ID
#   3. wrangler kv key put --binding=BS_KV "bs:gmail:credentials" \
#        '{"client_id":"...","client_secret":"...","refresh_token":"..."}'
[[kv_namespaces]]
binding = "BS_KV"
id = "PLACEHOLDER_BS_KV_ID"
