name = "bar-salotto"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Gmail OAuth credentials + thread ID cache.
# Disabled until the Gmail / Google Business Profile backend is connected.
# A placeholder id fails the Pages Functions deploy ("Invalid KV namespace ID"),
# which fails the whole deployment — so the binding stays commented out for now.
# The Functions tolerate a missing BS_KV (they return 503 and the dashboard
# falls back to manual mode), so the site deploys fine without it.
#
# To enable later:
#   1. wrangler kv namespace create BS_KV
#   2. Uncomment the block below and paste the printed namespace id
#   3. wrangler kv key put --binding=BS_KV "bs:gmail:credentials" \
#        '{"client_id":"...","client_secret":"...","refresh_token":"..."}'
#
[[kv_namespaces]]
binding = "BS_KV"
id = "35d90b858ebc4771840a23fac6870e94"
