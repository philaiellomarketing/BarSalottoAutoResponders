<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1551">
  <title>Bar Salotto — Inbox Manager</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c3922e;
      --gold-light: #e6b84a;
      --gold-pale: #f5e9d0;
      --navy: #0a1551;
      --navy-mid: #1a2d7a;
      --cream: #f8f6f1;
      --cream-dark: #ede9df;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #ddd7cc;
      --red: #d63031;
      --amber: #e17055;
      --green: #00b894;
      --shadow: 0 2px 8px rgba(10,21,81,.10);
      --shadow-lg: 0 6px 24px rgba(10,21,81,.15);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      color: #fff;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .header-logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .header-logo span { color: #fff; font-weight: 300; }
    .header-stats {
      display: flex;
      gap: 12px;
      margin-left: auto;
      align-items: center;
    }
    .stat-chip {
      background: rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 13px;
      white-space: nowrap;
    }
    .stat-chip strong { color: var(--gold-light); }
    .header-refresh {
      background: none;
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .header-refresh:hover { background: rgba(255,255,255,.1); }

    /* ── Filter bar ── */
    .filter-bar {
      position: sticky;
      top: 60px;
      z-index: 90;
      background: var(--cream-dark);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-tab {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .filter-tab:hover { color: var(--navy); }
    .filter-tab.active {
      color: var(--navy);
      border-bottom-color: var(--gold);
    }
    .filter-tab .badge {
      display: inline-block;
      background: var(--gold-pale);
      color: var(--gold);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 5px;
    }

    /* ── Main content ── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: var(--shadow-lg); }
    .card.done {
      opacity: .55;
      pointer-events: none;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 16px 12px;
      position: relative;
    }
    .priority-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: var(--radius) 0 0 0;
    }
    .priority-bar.urgent { background: var(--red); }
    .priority-bar.medium { background: var(--amber); }
    .priority-bar.low    { background: #b2bec3; }

    .card-meta {
      flex: 1;
      min-width: 0;
      padding-left: 4px;
    }
    .card-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .category-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 7px;
    }
    .badge-dining    { background: #dfe6fd; color: #2d3e9e; }
    .badge-catering  { background: #fde8d8; color: #9b4a1e; }
    .badge-creator   { background: #e0f5ea; color: #1a7a45; }
    .badge-review    { background: #fff3cd; color: #856404; }
    .badge-donation  { background: #fde8f5; color: #8b2264; }
    .badge-vendor    { background: #f0f0f0; color: #555; }
    .badge-job       { background: #e8f4fd; color: #1a6b9a; }

    .card-sender {
      font-size: 14px;
      font-weight: 600;
    }
    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .card-subject {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    /* ── Draft ── */
    .draft-section {
      border-top: 1px solid var(--border);
      background: #fdfdfc;
    }
    .draft-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      text-align: left;
      transition: background .12s;
    }
    .draft-toggle:hover { background: var(--gold-pale); }
    .draft-toggle .chevron {
      margin-left: auto;
      font-size: 10px;
      transition: transform .2s;
    }
    .draft-toggle.open .chevron { transform: rotate(180deg); }
    .draft-label-tag {
      font-size: 10px;
      background: var(--gold-pale);
      color: var(--gold);
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .draft-body {
      padding: 0 16px 12px;
      display: none;
    }
    .draft-body.open { display: block; }
    .draft-text {
      font-size: 13px;
      line-height: 1.65;
      color: #333;
      white-space: pre-wrap;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .draft-edit-area {
      width: 100%;
      font-size: 13px;
      line-height: 1.65;
      color: #333;
      background: #fff;
      border: 2px solid var(--gold);
      border-radius: 6px;
      padding: 12px 14px;
      resize: vertical;
      min-height: 160px;
      font-family: inherit;
      display: none;
    }
    .draft-edit-area.open { display: block; }

    /* ── Action bar ── */
    .action-bar {
      padding: 10px 16px 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: filter .12s, transform .08s;

    .btn-approve {

      color: #fff;
    }

      color: #fff;

    .btn-cancel-edit {

      color: #555;
      display: none;
    }
    .btn-skip {
      background: none;
      border: 1px solid var(--border);

    .btn-skip:hover { border-color: #aaa; color: #333; }

    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--navy);
      color: #fff;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      box-shadow: var(--shadow-lg);
      animation: toast-in .2s ease;
      max-width: 320px;
    }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.info    { border-left: 4px solid var(--gold); }
    .toast.warning { border-left: 4px solid var(--amber); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 16px; color: var(--navy); margin-bottom: 6px; }

    .connect-banner {
      background: var(--gold-pale);
      border: 1px solid rgba(195,146,46,.4);
      border-radius: var(--radius);

      margin-bottom: 20px;

      font-weight: 600;
      text-decoration: none;
    }

    .banner-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────

const STATE_KEY = 'bs-inbox-state';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { return {}; }
}
function saveState(s) {
  localStorage.setItem(STATE_KEY, JSON.stringify(s));
}

let state = loadState(); // { [id]: { done, flagged, edited_draft } }

function getItemState(id) {
  return state[id] || {};
}
function updateItemState(id, patch) {
  state[id] = { ...getItemState(id), ...patch };
  saveState(state);
}

// ── Filter ────────────────────────────────────────────────────────────────────

let activeFilter = 'all';

function filteredItems() {
  return ITEMS.filter(item => {
    const s = getItemState(item.id);
    if (s.done) return false;
    if (activeFilter === 'all') return true;
    return item.category === activeFilter;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const container = document.getElementById('cards-container');

  document.getElementById('empty-state').style.display = items.length ? 'none' : 'block';
  updateBadges();
  updateHeaderStats();
  bindCardEvents();
}

  }[item.creator?.recommendation] || 'rec-caution';

  return `
<div class="card" id="card-${item.id}" data-id="${item.id}" data-category="${item.category}">
  <div class="card-header">
    <div class="priority-bar ${item.priority}"></div>
    <div class="card-meta">
      <div class="card-top-row">
        <span class="category-badge badge-${item.category}">${categoryLabel(item.category)}</span>
        <span class="card-sender">${esc(item.sender)}</span>
        <span class="card-date">${esc(item.date)}</span>
      </div>
      <div class="card-subject">${esc(item.subject)}</div>
    </div>
  </div>

  <div class="draft-section">
    <button class="draft-toggle" onclick="toggleDraft('${item.id}')">
      <span>📝</span>
      <span>Draft Response</span>
      ${s.edited_draft ? '<span class="draft-label-tag">EDITED</span>' : ''}
      <span class="chevron">▼</span>
    </button>
    <div class="draft-body" id="draft-body-${item.id}">
      ${creatorHtml}
      <pre class="draft-text" id="draft-text-${item.id}">${esc(draft)}</pre>
      <textarea class="draft-edit-area" id="draft-edit-${item.id}" spellcheck="true">${esc(draft)}</textarea>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-approve" onclick="approveDraft('${item.id}')">✅ Save to Drafts</button>
    <button class="btn btn-edit" id="btn-edit-${item.id}" onclick="startEdit('${item.id}')">✏️ Edit</button>
    <button class="btn btn-save-edit" id="btn-save-${item.id}" onclick="saveEdit('${item.id}')">💾 Save</button>
    <button class="btn btn-cancel-edit" id="btn-cancel-${item.id}" onclick="cancelEdit('${item.id}')">Cancel</button>
    <button class="btn btn-skip" onclick="skipItem('${item.id}')">Skip</button>
    <div class="gmail-actions">
      <button class="btn-gmail archive" title="Archive" onclick="gmailAction('${item.id}', 'archive')">📦</button>
      <button class="btn-gmail trash" title="Move to Trash" onclick="gmailAction('${item.id}', 'trash')">🗑️</button>
      <button class="btn-gmail flag${flagClass}" id="btn-flag-${item.id}" title="Flag / Star" onclick="gmailAction('${item.id}', 'flag')">🚩</button>
    </div>
  </div>
</div>`;
}

function renderCreatorProfile(c) {
  const recClass = { approve: 'rec-approve', caution: 'rec-caution', decline: 'rec-decline' }[c.recommendation] || 'rec-caution';
  return `
<div class="creator-profile">
  <h4>Creator Profile</h4>
  <div class="creator-stats">
    <div class="creator-stat"><span class="label">Handle</span><span class="value">${esc(c.handle)}</span></div>
    <div class="creator-stat"><span class="label">Platforms</span><span class="value">${esc(c.platforms)}</span></div>
    <div class="creator-stat"><span class="label">Followers</span><span class="value">${esc(c.followers)}</span></div>
    <div class="creator-stat"><span class="label">Engagement</span><span class="value">${esc(c.engagement)}</span></div>
    <div class="creator-stat"><span class="label">Content</span><span class="value">${esc(c.contentType)}</span></div>
    <div class="creator-stat"><span class="label">Asking for</span><span class="value">${esc(c.ask)}</span></div>
  </div>
  <span class="creator-rec ${recClass}">${c.recText}</span>
</div>`;
}

function categoryLabel(cat) {
  return { dining:'Group Dining', catering:'Catering', creator:'Creator', review:'Review', donation:'Donation', vendor:'Vendor', job:'Job App' }[cat] || cat;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Card interactions ─────────────────────────────────────────────────────────

function bindCardEvents() {
  // auto-expand first card's draft
  const first = filteredItems()[0];
  if (first) {
    const body = document.getElementById(`draft-body-${first.id}`);
    const toggle = document.querySelector(`#card-${first.id} .draft-toggle`);
    if (body && !body.classList.contains('open')) {
      body.classList.add('open');
      if (toggle) toggle.classList.add('open');
    }
  }
}

function toggleDraft(id) {
  const body = document.getElementById(`draft-body-${id}`);
  const toggle = document.querySelector(`#card-${id} .draft-toggle`);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function startEdit(id) {
  const s = getItemState(id);
  const draft = s.edited_draft || ITEMS.find(i => i.id === id).draft;
  document.getElementById(`draft-text-${id}`).style.display = 'none';
  const ta = document.getElementById(`draft-edit-${id}`);
  ta.value = draft;
  ta.classList.add('open');
  document.getElementById(`btn-edit-${id}`).style.display = 'none';
  document.getElementById(`btn-save-${id}`).style.display = 'inline-flex';
  document.getElementById(`btn-cancel-${id}`).style.display = 'inline-flex';
  const body = document.getElementById(`draft-body-${id}`);
  if (!body.classList.contains('open')) toggleDraft(id);
}

function saveEdit(id) {
  const val = document.getElementById(`draft-edit-${id}`).value;
  updateItemState(id, { edited_draft: val });
  toast('Draft saved.', 'info');
  render();
}

function cancelEdit(id) {
  document.getElementById(`draft-text-${id}`).style.display = '';
  document.getElementById(`draft-edit-${id}`).classList.remove('open');
  document.getElementById(`btn-edit-${id}`).style.display = '';
  document.getElementById(`btn-save-${id}`).style.display = 'none';
  document.getElementById(`btn-cancel-${id}`).style.display = 'none';
}

// ── Gmail actions ─────────────────────────────────────────────────────────────

async function approveDraft(id) {
  const item = ITEMS.find(i => i.id === id);
  const s = getItemState(id);
  const draftBody = s.edited_draft || item.draft;

  // Try Cloudflare Function API first
  const result = await callApi('create_draft', {
    id, to: item.email, subject: `Re: ${item.subject}`, body: draftBody
  });

  if (result.ok) {
    toast(`Draft saved to Gmail for ${item.sender}.`, 'success');
  } else {
    // Fallback: open mailto
    const mailto = `mailto:${item.email || ''}?subject=${encodeURIComponent('Re: ' + item.subject)}&body=${encodeURIComponent(draftBody)}`;
    window.open(mailto);
    toast(`Opened in mail client (Gmail API not connected).`, 'warning');
  }
  markDone(id);
}

async function gmailAction(id, action) {
  const item = ITEMS.find(i => i.id === id);

  if (action === 'flag') {
    const s = getItemState(id);
    const nowFlagged = !s.flagged;
    updateItemState(id, { flagged: nowFlagged });
    const btn = document.getElementById(`btn-flag-${id}`);
    if (btn) btn.classList.toggle('flagged', nowFlagged);
    toast(nowFlagged ? `Flagged: ${item.sender}` : `Unflagged: ${item.sender}`, 'info');

    await callApi('flag', { id, flagged: nowFlagged });
    return;
  }

  const result = await callApi(action, { id });
  const labels = { archive: '📦 Archived', trash: '🗑️ Moved to trash' };
  if (result.ok) {
    toast(`${labels[action]}: ${item.sender}`, 'success');
  } else {
    toast(`${labels[action]}: ${item.sender} (Gmail API not connected — marked locally)`, 'warning');
  }
  if (action !== 'flag') markDone(id);
}

async function callApi(action, payload) {
  try {
    const res = await fetch('/api/gmail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload }),
    });
    if (res.ok) return { ok: true, data: await res.json() };
    return { ok: false };
  } catch {
    return { ok: false };
  }
}

function skipItem(id) {
  toast('Skipped — item stays in queue.', 'info');
}

function markDone(id) {
  updateItemState(id, { done: true });
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('done');
    setTimeout(() => render(), 600);
  }
  updateHeaderStats();
}

// ── Badges & stats ────────────────────────────────────────────────────────────

function updateBadges() {
  const cats = ['all','dining','catering','creator','review','donation','vendor','job'];
  const counts = {};
  cats.forEach(c => counts[c] = 0);
  ITEMS.forEach(item => {
    if (getItemState(item.id).done) return;
    counts.all++;
    counts[item.category] = (counts[item.category] || 0) + 1;
  });
  cats.forEach(c => {
    const el = document.getElementById(`badge-${c}`);
    if (el) el.textContent = counts[c] || 0;
  });
}

function updateHeaderStats() {
  const pending = ITEMS.filter(i => !getItemState(i.id).done).length;
  const done = ITEMS.filter(i => getItemState(i.id).done).length;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent = done;
}

function refreshStats() {
  toast('Refreshed.', 'info');
  render();
}

// ── Filter tabs ───────────────────────────────────────────────────────────────

document.getElementById('filter-bar').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.filter;
  render();
});

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Banner ────────────────────────────────────────────────────────────────────

function dismissBanner() {
  document.getElementById('connect-banner').style.display = 'none';
  localStorage.setItem('bs-banner-dismissed', '1');
}

if (localStorage.getItem('bs-banner-dismissed')) {
  document.getElementById('connect-banner').style.display = 'none';
}

// ── Init ──────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
